name: Update Benchmark Baseline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

concurrency:
  group: update-baseline-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  baseline:
    uses: AztecProtocol/aztec-benchmark/.github/workflows/update-baseline.yml@39244c9306f7b460aec570297100f3513f7ef936 # v5.0.1
    with:
      runner: ubuntu-latest
    permissions:
      contents: read
      actions: write
    secrets: inherit
